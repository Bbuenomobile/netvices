<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6ec7"/>
      <stop offset="50%" style="stop-color:#e80082"/>
      <stop offset="100%" style="stop-color:#9b30ff"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <text x="64" y="80" font-family="Impact, sans-serif" font-size="72" font-weight="bold" fill="url(#text)" text-anchor="middle" filter="url(#glow)">N</text>
  <rect x="10" y="100" width="108" height="3" rx="1.5" fill="#00f5ff" opacity="0.8"/>
</svg>
